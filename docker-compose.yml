

services:
  db:
    image: postgres:16-alpine
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appointment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Opcional: Interface visual para ver o banco no navegador
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-appointment
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db